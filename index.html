<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一括検索ツール</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: #f5f5f7;
    color: #1d1d1f;
    padding: 16px;
    max-width: 720px;
    margin: 0 auto;
    line-height: 1.5;
  }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #6e6e73; margin-bottom: 16px; }
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    color: #1d1d1f;
  }
  textarea {
    width: 100%;
    min-height: 180px;
    padding: 12px;
    border: 1px solid #d2d2d7;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
    line-height: 1.6;
  }
  textarea:focus, input:focus, select:focus {
    outline: none;
    border-color: #0071e3;
  }
  input[type="text"], select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #d2d2d7;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    background: #fff;
  }
  .row { display: flex; gap: 8px; margin-bottom: 12px; }
  .row > div { flex: 1; }
  .row > div:last-child { flex: 0 0 auto; min-width: 100px; }
  .btn {
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.15s;
  }
  .btn:active { opacity: 0.7; }
  .btn-primary {
    background: #0071e3;
    color: #fff;
    width: 100%;
  }
  .btn-secondary {
    background: #e8e8ed;
    color: #1d1d1f;
  }
  .options {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .options label {
    display: flex;
    align-items: center;
    font-weight: normal;
    font-size: 13px;
    gap: 6px;
    margin: 0;
    cursor: pointer;
  }
  .preview {
    margin-top: 12px;
    padding: 12px;
    background: #f5f5f7;
    border-radius: 8px;
    font-size: 12px;
    max-height: 200px;
    overflow-y: auto;
  }
  .preview-item {
    padding: 6px 0;
    border-bottom: 1px solid #e0e0e0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .preview-item:last-child { border-bottom: none; }
  .preview-item a {
    color: #0071e3;
    text-decoration: none;
    font-size: 12px;
    word-break: break-all;
    flex: 1;
  }
  .preview-item a:hover { text-decoration: underline; }
  .count {
    font-size: 12px;
    color: #6e6e73;
    margin-bottom: 8px;
  }
  .warning {
    font-size: 12px;
    color: #b85c00;
    background: #fff8e6;
    padding: 8px 10px;
    border-radius: 6px;
    margin-bottom: 12px;
  }
</style>
</head>
<body>
  <h1>🔍 一括検索ツール</h1>
  <p class="sub">改行区切りで複数KWを入力 → ボタン1つで全部新規タブで開く</p>

  <div class="card">
    <label for="keywords">検索キーワード（1行1KW）</label>
    <textarea id="keywords" placeholder="クレジットカード 比較&#10;JCBカード W&#10;楽天カード 還元率&#10;..."></textarea>
    <div class="count" id="count">0 件</div>
  </div>

  <div class="card">
    <label>検索エンジン</label>
    <select id="engine">
      <option value="https://www.google.com/search?q=">Google</option>
      <option value="https://search.yahoo.co.jp/search?p=">Yahoo! Japan</option>
      <option value="https://www.bing.com/search?q=">Bing</option>
      <option value="https://duckduckgo.com/?q=">DuckDuckGo</option>
      <option value="https://www.youtube.com/results?search_query=">YouTube</option>
      <option value="https://x.com/search?q=">X (Twitter)</option>
      <option value="https://www.amazon.co.jp/s?k=">Amazon JP</option>
    </select>

    <div style="height: 12px;"></div>

    <div class="row">
      <div>
        <label for="prefix">共通の前置きワード（任意）</label>
        <input type="text" id="prefix" placeholder='例: "クレジットカード"'>
      </div>
      <div>
        <label for="suffix">共通の後置きワード（任意）</label>
        <input type="text" id="suffix" placeholder="例: 比較">
      </div>
    </div>

    <div class="options">
      <label><input type="checkbox" id="exact"> 完全一致（"" で囲む）</label>
      <label><input type="checkbox" id="newWindow" checked> 新規タブで開く</label>
    </div>

    <button class="btn btn-primary" onclick="runSearch()">🚀 一括検索する</button>
  </div>

  <div class="warning" id="warning" style="display:none;">
    ⚠️ ポップアップがブロックされた可能性があります。ブラウザでこのページのポップアップを許可するか、下のプレビューから個別にクリックしてください。
  </div>

  <div class="card">
    <label>プレビュー（Cmd/Ctrl+クリックで個別に開けます）</label>
    <div class="preview" id="preview">
      <div style="color: #6e6e73; text-align: center; padding: 20px;">KWを入力するとここに表示されます</div>
    </div>
  </div>

<script>
  const $kw = document.getElementById('keywords');
  const $count = document.getElementById('count');
  const $preview = document.getElementById('preview');
  const $engine = document.getElementById('engine');
  const $prefix = document.getElementById('prefix');
  const $suffix = document.getElementById('suffix');
  const $exact = document.getElementById('exact');
  const $warning = document.getElementById('warning');

  function getKeywords() {
    return $kw.value.split('\n').map(k => k.trim()).filter(k => k.length > 0);
  }

  function buildQuery(kw) {
    let q = kw;
    if ($exact.checked) q = `"${q}"`;
    const pre = $prefix.value.trim();
    const suf = $suffix.value.trim();
    if (pre) q = `${pre} ${q}`;
    if (suf) q = `${q} ${suf}`;
    return q;
  }

  function buildUrl(kw) {
    return $engine.value + encodeURIComponent(buildQuery(kw));
  }

  function updatePreview() {
    const kws = getKeywords();
    $count.textContent = `${kws.length} 件`;
    if (kws.length === 0) {
      $preview.innerHTML = '<div style="color: #6e6e73; text-align: center; padding: 20px;">KWを入力するとここに表示されます</div>';
      return;
    }
    $preview.innerHTML = kws.map(kw => {
      const url = buildUrl(kw);
      const q = buildQuery(kw);
      return `
        <div class="preview-item">
          <a href="${url}" target="_blank" rel="noopener">${escapeHtml(q)}</a>
        </div>
      `;
    }).join('');
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function runSearch() {
    const kws = getKeywords();
    if (kws.length === 0) {
      alert('検索KWを入力してください');
      return;
    }
    if (kws.length > 20) {
      if (!confirm(`${kws.length}件のタブを開きます。本当に続けますか？`)) return;
    }
    $warning.style.display = 'none';
    let blocked = 0;
    let opened = 0;
    // 同期的に全部開く（setTimeoutを使うとユーザージェスチャーから外れてブロックされる）
    for (const kw of kws) {
      const w = window.open(buildUrl(kw), '_blank');
      if (!w || w.closed) {
        blocked++;
      } else {
        opened++;
      }
    }
    if (blocked > 0) {
      $warning.style.display = 'block';
      $warning.innerHTML = `⚠️ ${blocked}件のタブがブロックされました（${opened}件は開けました）。<br>
      アドレスバー右端の<b>ポップアップブロックアイコン</b>をクリックして「このサイトのポップアップを常に許可」に設定してから再実行するか、<br>
      下のプレビューから <b>Cmd/Ctrl + クリック</b>（または中クリック）で個別に開いてください。`;
    }
  }

  $kw.addEventListener('input', updatePreview);
  $engine.addEventListener('change', updatePreview);
  $prefix.addEventListener('input', updatePreview);
  $suffix.addEventListener('input', updatePreview);
  $exact.addEventListener('change', updatePreview);

  updatePreview();
</script>
</body>
</html>
