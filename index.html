<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一括検索 KENTA君</title>
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><ellipse cx='50' cy='58' rx='35' ry='32' fill='%23d18a3d'/><ellipse cx='50' cy='70' rx='22' ry='16' fill='%23fff'/><polygon points='22,22 18,55 40,45' fill='%23d18a3d'/><polygon points='78,22 82,55 60,45' fill='%23d18a3d'/><polygon points='26,32 24,50 36,45' fill='%23f5b878'/><polygon points='74,32 76,50 64,45' fill='%23f5b878'/><circle cx='38' cy='52' r='4' fill='%23000'/><circle cx='62' cy='52' r='4' fill='%23000'/><circle cx='39' cy='51' r='1.2' fill='%23fff'/><circle cx='63' cy='51' r='1.2' fill='%23fff'/><ellipse cx='50' cy='63' rx='4' ry='3' fill='%23000'/><path d='M50 67 Q45 73 41 71 M50 67 Q55 73 59 71' stroke='%23000' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: #f5f5f7;
    color: #1d1d1f;
    padding: 16px;
    max-width: 720px;
    margin: 0 auto;
    line-height: 1.5;
  }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #6e6e73; margin-bottom: 16px; }
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    color: #1d1d1f;
  }
  textarea {
    width: 100%;
    min-height: 180px;
    padding: 12px;
    border: 1px solid #d2d2d7;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
    line-height: 1.6;
  }
  textarea:focus, input:focus, select:focus {
    outline: none;
    border-color: #0071e3;
  }
  input[type="text"], select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #d2d2d7;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    background: #fff;
  }
  .row { display: flex; gap: 8px; margin-bottom: 12px; }
  .row > div { flex: 1; }
  .row > div:last-child { flex: 0 0 auto; min-width: 100px; }
  .btn {
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.15s;
  }
  .btn:active { opacity: 0.7; }
  .btn-primary {
    background: #0071e3;
    color: #fff;
    width: 100%;
  }
  .btn-secondary {
    background: #e8e8ed;
    color: #1d1d1f;
  }
  .options {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .options label {
    display: flex;
    align-items: center;
    font-weight: normal;
    font-size: 13px;
    gap: 6px;
    margin: 0;
    cursor: pointer;
  }
  .preview {
    margin-top: 12px;
    padding: 12px;
    background: #f5f5f7;
    border-radius: 8px;
    font-size: 12px;
    max-height: 200px;
    overflow-y: auto;
  }
  .preview-item {
    padding: 6px 0;
    border-bottom: 1px solid #e0e0e0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .preview-item:last-child { border-bottom: none; }
  .preview-item a {
    color: #0071e3;
    text-decoration: none;
    font-size: 12px;
    word-break: break-all;
    flex: 1;
  }
  .preview-item a:hover { text-decoration: underline; }
  .count {
    font-size: 12px;
    color: #6e6e73;
    margin-bottom: 8px;
  }
  .warning {
    font-size: 12px;
    color: #b85c00;
    background: #fff8e6;
    padding: 8px 10px;
    border-radius: 6px;
    margin-bottom: 12px;
  }
</style>
</head>
<body>
  <h1 style="display: flex; align-items: center; gap: 8px;">
    <svg viewBox="0 0 140 90" width="64" height="40" style="flex-shrink: 0;">
      <!-- しっぽ（先に描画。回転中心は根本） -->
      <g>
        <ellipse cx="12" cy="42" rx="7" ry="5" fill="#d18a3d"/>
        <ellipse cx="10" cy="40" rx="3" ry="2" fill="#fff"/>
        <animateTransform 
          attributeName="transform"
          type="rotate"
          values="-50 22 44; 50 22 44; -50 22 44"
          dur="0.4s"
          repeatCount="indefinite"/>
      </g>
      <!-- ボディ（コーギーらしい長め胴体） -->
      <ellipse cx="65" cy="55" rx="40" ry="18" fill="#d18a3d"/>
      <!-- お腹の白 -->
      <ellipse cx="65" cy="62" rx="34" ry="9" fill="#fff"/>
      <!-- 短足4本 -->
      <rect x="38" y="68" width="7" height="13" rx="2" fill="#fff"/>
      <rect x="54" y="68" width="7" height="13" rx="2" fill="#fff"/>
      <rect x="72" y="68" width="7" height="13" rx="2" fill="#fff"/>
      <rect x="88" y="68" width="7" height="13" rx="2" fill="#fff"/>
      <!-- 顔 -->
      <ellipse cx="105" cy="46" rx="20" ry="17" fill="#d18a3d"/>
      <!-- マズル（白い口元） -->
      <ellipse cx="113" cy="52" rx="11" ry="8" fill="#fff"/>
      <!-- 立ち耳 -->
      <polygon points="93,20 90,42 105,38" fill="#d18a3d"/>
      <polygon points="115,20 118,40 105,38" fill="#a86a25"/>
      <polygon points="96,28 94,40 102,38" fill="#f5b878"/>
      <!-- 鼻 -->
      <ellipse cx="120" cy="50" rx="3" ry="2.5" fill="#000"/>
      <!-- 目 -->
      <circle cx="101" cy="41" r="2.2" fill="#000"/>
      <circle cx="101.5" cy="40.3" r="0.8" fill="#fff"/>
      <!-- スマイル -->
      <path d="M 115 54 Q 111 57 107 56" stroke="#000" stroke-width="1.3" fill="none" stroke-linecap="round"/>
      <!-- ほっぺ -->
      <circle cx="95" cy="50" r="2.5" fill="#f4a8a8" opacity="0.6"/>
    </svg>
    <span>一括検索 KENTA君</span>
  </h1>
  <p class="sub">改行区切りで複数KW・URLを入力 → ボタン1つで全部新規タブで開く</p>

  <div class="card">
    <label for="keywords">検索KW / URL（1行1件、混在OK）</label>
    <textarea id="keywords" placeholder="KENTA  ダンス  天才&#10;ダンス 出会えるスタジオ&#10;（URLも貼り付けOK）"></textarea>
    <div class="count" id="count">0 件</div>
  </div>

  <div class="card">
    <label>検索エンジン</label>
    <select id="engine">
      <option value="https://www.google.com/search?q=">Google</option>
      <option value="https://search.yahoo.co.jp/search?p=">Yahoo! Japan</option>
      <option value="https://www.bing.com/search?q=">Bing</option>
      <option value="https://duckduckgo.com/?q=">DuckDuckGo</option>
      <option value="https://www.youtube.com/results?search_query=">YouTube</option>
      <option value="https://x.com/search?q=">X (Twitter)</option>
      <option value="https://www.amazon.co.jp/s?k=">Amazon JP</option>
    </select>

    <div style="height: 12px;"></div>

    <div class="row">
      <div>
        <label for="prefix">共通の前置きワード（任意）</label>
        <input type="text" id="prefix" placeholder='例: "クレジットカード"'>
      </div>
      <div>
        <label for="suffix">共通の後置きワード（任意）</label>
        <input type="text" id="suffix" placeholder="例: 比較">
      </div>
    </div>

    <div class="options">
      <label><input type="checkbox" id="exact"> 完全一致（"" で囲む）</label>
      <label><input type="checkbox" id="newWindow" checked> 新規タブで開く</label>
    </div>

    <button class="btn btn-primary" onclick="runSearch()">🚀 一括検索する</button>
  </div>

  <div class="warning" id="warning" style="display:none;">
    ⚠️ ポップアップがブロックされた可能性があります。ブラウザでこのページのポップアップを許可するか、下のプレビューから個別にクリックしてください。
  </div>

  <div class="card">
    <label>プレビュー（Cmd/Ctrl+クリックで個別に開けます）</label>
    <div class="preview" id="preview">
      <div style="color: #6e6e73; text-align: center; padding: 20px;">KWを入力するとここに表示されます</div>
    </div>
  </div>

<script>
  const $kw = document.getElementById('keywords');
  const $count = document.getElementById('count');
  const $preview = document.getElementById('preview');
  const $engine = document.getElementById('engine');
  const $prefix = document.getElementById('prefix');
  const $suffix = document.getElementById('suffix');
  const $exact = document.getElementById('exact');
  const $warning = document.getElementById('warning');

  function getItems() {
    return $kw.value.split('\n').map(k => k.trim()).filter(k => k.length > 0);
  }

  function isUrl(str) {
    // http(s):// で始まる
    if (/^https?:\/\//i.test(str)) return true;
    // ドメイン形式: example.com, sub.example.co.jp, example.com/path?q=1 等
    // スペースが含まれていたら検索クエリ扱い
    if (/\s/.test(str)) return false;
    if (/^[a-z0-9-]+(\.[a-z0-9-]+)+([\/?#].*)?$/i.test(str)) return true;
    return false;
  }

  function buildSearchQuery(kw) {
    let q = kw;
    if ($exact.checked) q = `"${q}"`;
    const pre = $prefix.value.trim();
    const suf = $suffix.value.trim();
    if (pre) q = `${pre} ${q}`;
    if (suf) q = `${q} ${suf}`;
    return q;
  }

  function buildUrl(item) {
    if (isUrl(item)) {
      return /^https?:\/\//i.test(item) ? item : 'https://' + item;
    }
    return $engine.value + encodeURIComponent(buildSearchQuery(item));
  }

  function getDisplay(item) {
    if (isUrl(item)) return { icon: '🔗', label: item };
    return { icon: '🔍', label: buildSearchQuery(item) };
  }

  function updatePreview() {
    const items = getItems();
    const urlCount = items.filter(isUrl).length;
    const kwCount = items.length - urlCount;
    $count.textContent = `${items.length} 件（🔍 検索 ${kwCount} / 🔗 URL ${urlCount}）`;
    if (items.length === 0) {
      $preview.innerHTML = '<div style="color: #6e6e73; text-align: center; padding: 20px;">KWまたはURLを入力するとここに表示されます</div>';
      return;
    }
    $preview.innerHTML = items.map(item => {
      const url = buildUrl(item);
      const d = getDisplay(item);
      return `
        <div class="preview-item">
          <span style="margin-right: 4px;">${d.icon}</span>
          <a href="${url}" target="_blank" rel="noopener">${escapeHtml(d.label)}</a>
        </div>
      `;
    }).join('');
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function runSearch() {
    const items = getItems();
    if (items.length === 0) {
      alert('KWまたはURLを入力してください');
      return;
    }
    if (items.length > 20) {
      if (!confirm(`${items.length}件のタブを開きます。本当に続けますか？`)) return;
    }
    $warning.style.display = 'none';

    for (const item of items) {
      const a = document.createElement('a');
      a.href = buildUrl(item);
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      document.body.appendChild(a);
      a.click();
      a.remove();
    }

    $warning.style.display = 'block';
    $warning.innerHTML = `💡 タブが1つしか開かない場合は、アドレスバー右端の <b>🚫アイコン</b> をクリック → 「このサイトのポップアップを<b>常に許可</b>」を選択 → ページをリロードして再試行してください。`;
  }

  $kw.addEventListener('input', updatePreview);
  $engine.addEventListener('change', updatePreview);
  $prefix.addEventListener('input', updatePreview);
  $suffix.addEventListener('input', updatePreview);
  $exact.addEventListener('change', updatePreview);

  updatePreview();
</script>
</body>
</html>
